name: SEO Growth Pipeline

on:
  schedule:
    # 매주 월요일 새벽 3시 UTC (KST 12시)
    - cron: "0 3 * * 1"
  workflow_dispatch:
    inputs:
      mode:
        description: "실행 모드"
        required: false
        default: "discover"
        type: choice
        options:
          - discover
          - discover-full
          - discover-keywords

jobs:
  seo-growth:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - run: npm ci

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      # 이전 실행 결과를 S3에서 내려받아 incremental 베이스로 사용
      - name: Seed allowlist from S3
        run: |
          mkdir -p src/shared/config/seo
          aws s3 cp s3://haemeok-s3-bucket/seo/allowlist.json \
            src/shared/config/seo/sitemap-allowlist.json \
            || echo "No existing allowlist on S3, starting fresh"

      # 매주 자동: ACTIVE 확장 + IMMATURE 재검사
      - name: SEO Discover (incremental)
        if: ${{ github.event_name == 'schedule' || inputs.mode == 'discover' }}
        run: npm run seo:discover

      # 초기 전수 탐색
      - name: SEO Discover (full)
        if: ${{ inputs.mode == 'discover-full' }}
        run: npm run seo:discover:full
        timeout-minutes: 90

      # 트렌드 키워드 탐색
      - name: SEO Discover Keywords
        if: ${{ inputs.mode == 'discover-keywords' }}
        run: npm run seo:discover:keywords
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}

      # 리포트
      - name: SEO Report
        run: npm run seo:report

      # 결과를 S3에 업로드 (sitemap.ts가 여기서 fetch)
      - name: Upload allowlist to S3
        run: |
          aws s3 cp src/shared/config/seo/sitemap-allowlist.json \
            s3://haemeok-s3-bucket/seo/allowlist.json \
            --content-type application/json \
            --cache-control "public, max-age=3600"
